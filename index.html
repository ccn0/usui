<p>USUI is a lightweight JavaScript toolkit designed to make creating menus or configs for Userscripts easier.
You can create Popups, which are draggable and customizable windows, with many settings to change their behavior.
USUI also comes with built-in modules to ease development of configuration menus, and have a standard look across browsers and mobile.</p>

<p>USUI is currently in open-beta, so anyone's allowed to use it, just be wary of any sudden changes
    or stability issues.
    Report bugs, or request features on <a href="https://github.com/ccn0/usui/issues">GitHub</a>
</p>

<h2>Modules</h2>

<p>The Color Picker module (<code>iRGB()</code>) creates a psuedo-input element that acts to replace
    the already existing HTML color inputs (<code>&lt;input type="color"&gt;</code>) built-in to many
    browsers, as they are all bad in their own ways, including this one actually.
    Also important to note: you have to use <code>input.dataset.value</code>
    and not just <code>input.value</code>. Yes, the styling is based on Firefox's color inputs.
</p>

<p>Building Blocks are a set of modules designed to make creating forms, info boxes, and configs easier.
    You can create text and graphics, button groups, and input fields very easily with them.
    Range inputs (sliders, <code>&lt;input type="range"&gt;</code>) have a way to automatically
    add tick marks to indicate minimums and maximums, as long as they are provided.
</p>

<p>You can view examples of USUI's modules by clicking the buttons in the titlebar.</p>

<h2>Why and What's next</h2>

<p>After creating an entire popup window system like USUI from scratch for just one Userscript,
    which <span title="only the dark of night">never even saw the light of day</span>,
    I decided it would be much easier to implement only one little library of utilities,
    as opposed to creating a new one per Userscript.
    The main ethos when I was making USUI was that the default theme for popups and modules should
    look very barebones by default, which enables you have the liberty to customize them with much
    more freedoms, where literally anything else makes it look better.</p>

<p>Many more modules are planned to be added in the future, once I finally get around to them.
    I will probably continue to maintain USUI into the future, in case of impending GM API or other
    changes in the JavaScript ecosystem.
    I also fully intend on finding a purpose to this toolkit when creating or updating my existing
    Userscripts, as this allows a lot of potential ideas to be made faster and easier.
</p>

<h2>Usage</h2>

<p>You can use USUI by adding <code>@require https://usui.qog.app/lib/USUI.js</code> in the Userscript metadata block,
    and include the CSS using <code>USUI.spawnCSS()</code>, where you can specify the host
    and if it should overwrite any existing USUI. To refresh the version that's cached, add
    search parameters to the URL, e.g. <code>@require https://usui.qog.app/lib/USUI.js?v=25</code>.
</p>
<p><code>/usui/usui/</code> is the development branch, I just find this easier to manage
    than using git branches and shit.
</p>

    <script>
    openIFrame({url:"./usui.html"});
    function openIFrame(params) {
        /* this code is most definitely INSECURE AND NOT FOR PRODUCTION, so I'd make my own if I were you... */
        const oiContainer = USUI.createPopup({
            stay: false,
            id: "iframe",
            layer: 399,
            fencing: true,
            title: "UserScript UI",
            position: ["5%","5%"],
            style: "height:auto;width:auto;height:90%;width:90%;",
            buttons: [
                {
                    textContent: "X",
                    title: "Close",
                    event: () => {
                        USUIalert("Should run <code>USUI.closeMenu(popup);</code>, but you <em>can</em> close this popup!", {usehtml: true, titletext: "Closeable"})
                    },
                },
                {
                    textContent: "Modules",
                    title: "View USUI's built-in input modules",
                    event: moduleTest
                },
                {
                    textContent: "Building Blocks",
                    title: "View USUI's built-in UI modules",
                    event: buildingblocks
                },
            ],
        });

        const errContent = USUI.createPopupContent({
            style:"padding: 0;display: flex;flex-direction: row;",
        });

        const iframe = document.createElement("iframe");
        iframe.style.cssText = "flex:1;border:none;width:100%;height:100%";

        if (params.html && !params.url) {
            const blob = new Blob([params.html], { type: "text/html" });
            const blobURL = URL.createObjectURL(blob);
            iframe.src = blobURL;
        } else {
            iframe.src = params.url;
        };
        errContent.appendChild(iframe);

        oiContainer.appendChild(errContent);
        document.body.appendChild(oiContainer);
    }
    
    function USUIalert(message = "",params = {
        titletext: "Alert",
        usehtml: false,
    }) {
        const alertContainer = USUI.createPopup({
            stay: false, 
            position: ["6%","6%"],
            id: "alertmenu",
            title: params.titletext,
            buttons: [
                {
                textContent: "X",
                title: "Close"+(params.titletext.length > 0 ? " "+params.titletext+" Window": ""),
                classes: ["closebtn"],
                event: () => {
                    USUI.closeMenu(alertContainer);}
                },
            ]
        });
        alertContainer.style.height = "auto";

        const alertContent = USUI.createPopupContent({
            style: "padding: 5px 15px;display: block;flex-direction: column;",
        });
        if (params.usehtml) {
            alertContent.innerHTML = message;
        } else {
            alertContent.textContent = message;
        };

        alertContainer.appendChild(alertContent);
        document.body.appendChild(alertContainer);

        alertContainer.querySelector("button").focus();
    };
    
    function moduleTest() {
        const alertContainer = USUI.createPopup({
            stay: false, 
            position: ["6%","6%"],
            id: "modeultest",
            title: "USUI Modules",
            theme: "USUI_popup_T_defaultdark",
            buttons: [
                {
                textContent: "X",
                title: "Close Modules Window",
                classes: ["closebtn"],
                event: () => {
                    USUI.closeMenu(alertContainer);}
                },
            ]
        });
        alertContainer.style.height = "auto";

        const alertContent = USUI.createPopupContent({
            style: "padding: 15px;display: block;flex-direction: column;",
        });

        const row1 = document.createElement("div");
        row1.style.marginBottom = "16px";

        row1.appendChild(document.createTextNode("USUI Color Input: "));

        const exampleRGB = USUI.modules.iRGB({
            red: 230, 
            green: 70,
            blue: 149
        });
        exampleRGB.addEventListener('input',(e)=>{
            console.log(e.target.dataset.value);
        });
        row1.appendChild(exampleRGB);

        alertContent.appendChild(row1);

        const row2 = document.createElement("div");

        row2.appendChild(document.createTextNode("Normal Color Input: "));

        const dumbRGB = document.createElement("input");
        dumbRGB.type = "color";
        dumbRGB.value = "#e64695";
        dumbRGB.addEventListener('input',(e)=>{
            console.log(e.target.value);
        });
        row2.appendChild(dumbRGB);

        alertContent.appendChild(row2);

        alertContainer.appendChild(alertContent);
        document.body.appendChild(alertContainer);

        alertContainer.querySelector("button").focus();
    };

    function buildingblocks() {
        const alertContainer = USUI.createPopup({
            stay: false, 
            position: ["6%","6%"],
            id: "bbtest",
            title: "USUI Building Blocks",
            theme: "USUI_popup_T_defaultdark",
            style: "height:auto;max-height:50vh;",
            buttons: [
                {
                    text: "X",
                    title: "Close Building Blocks Window",
                    classes: ["closebtn"],
                    event: () => {
                        USUI.closeMenu(alertContainer);
                    }
                },
                {
                    text:"Options",
                    title:"See other popup options",
                    dropdown:[
                        {
                            text:"Toggle Dark Theme",
                            keepOpen:true,
                            action:()=>{
                                alertContainer.classList.toggle("USUI_popup_T_defaultdark");
                            }
                        }
                    ]
                },
            ]
        });

        const alertContent = USUI.createPopupContent({
            style:"flex:1;flex-direction:column;padding: 16px;display: flex;overflow-y:auto;",
        });

        alertContent.appendChild(USUI.modules.BBtext({
            text:"Building Blocks",
            tag:"h1",
        }));
        alertContent.appendChild(USUI.modules.BBtext({
            text:"Test out the Building Blocks modules!"
        }));

        const [exampleText,eginput] = USUI.modules.BBinput({
            id: "exampleInput",
            type:"text",
            label: "Text Input",
            value:"hello world!",
        });
        eginput.addEventListener('change',(e)=>{
            console.log(e.target.value);
        });
        alertContent.appendChild(exampleText);

        const [exampleColor,egcolori] = USUI.modules.BBinput({
            id: "exampleBBCI",
            type: "color",
            label: "Color Input",
            value:"#ffaa00",
        });
        egcolori.addEventListener('change',(e)=>{
            console.log(e.target.dataset.value);
            alertContainer.querySelector("#bbexampleparagraph").style.backgroundColor = e.target.dataset.value;
        });
        alertContent.appendChild(exampleColor);

        const [exampleBox,egbox] = USUI.modules.BBinput({
            id: "exampleBox",
            type:"checkbox",
            label: "Checkbox/Toggle",
            checked: true,
        });
        egbox.addEventListener('change',(e)=>{
            console.log(e.target.checked);
        });
        alertContent.appendChild(exampleBox);

        const [exampleRange,egrange] = USUI.modules.BBinput({
            id: "exampleRange",
            type:"range",
            label: "Range/Slider",
            tickSet: true,
            value: 10,
            min:0,
            max:100,
            step:1,
            ticks: 5,
            tooltip: true,
        });
        egrange.addEventListener('change',(e)=>{
            console.log(e.target.value);
        });
        alertContent.appendChild(exampleRange);

        alertContent.appendChild(USUI.modules.BBtext({
            tag:"hr",
        }));

        alertContent.appendChild(USUI.modules.BBtext({
            tag:"p",
            id: "bbexampleparagraph",
            style:"margin:0 16px 16px;",
            innerHTML:"<a href='#'>Building Blocks</a> are a set of modules designed to make creating forms or configs easier. You can create button groups and input fields very easily with them. Range inputs (sliders, <code>&lt;input type=\"range\"&gt;</code>) have a way to automatically add tick marks to indicate minimums and maximums, as long as they are provided."
        }));

        alertContent.appendChild(USUI.modules.BBbuttons({
            buttons: [
                {
                    text:"Alert 1",
                    title: "Alerts 1",
                    action: ()=>{
                        alert(1);
                    },
                },
                {
                    text:"Log 2+2",
                    title: "Log in the Console 2+2",
                    action: ()=>{
                        console.log(2+2);
                    },
                },
                {
                    text:"Close this",
                    title: "Literally closes this popup",
                    action: ()=>{
                        USUI.closeMenu(alertContainer);
                    },
                },
            ]
        }));

        alertContent.appendChild(USUI.modules.BBbuttons({
            buttons: [
                {
                    text:"Cancel",
                    title: "Does nothing",
                    id:"cancelbtn",
                    action: ()=>{
                    },
                },
                {
                    text:"Submit",
                    title: "Does nothing, the sequel",
                    classes: ["truactionblah"],
                    action: ()=>{
                    },
                },
            ]
        }));

        alertContainer.appendChild(alertContent);
        document.body.appendChild(alertContainer);

        alertContainer.querySelector("button").focus();
    };

    function bbTemplate() {
        const popupContainer = USUI.createPopup({
            stay: false, 
            position: ["6%","6%"],
            id: "bbtemplate",
            title: "Building Blocks Template",
            style: "height:auto;",
            buttons: [
                {
                    textContent: "X",
                    title: "Close Window",
                    classes: ["closebtn"],
                    event: () => {
                        USUI.closeMenu(popupContainer);
                    }
                },
            ]
        });

        const popupContent = USUI.createPopupContent({
            style: "padding: 15px;display: block;flex-direction: column;",
        });

        const [exampleText,eginput] = USUI.modules.BBinput({
            id: "exampleInput",
            type:"text",
            label: "Text Input",
            value:"#ffaa00",
        });
        eginput.addEventListener('change',(e)=>{
            console.log(e.target.value);
        });
        popupContent.appendChild(exampleText);

        popupContent.appendChild(USUI.modules.BBbuttons({
            buttons: [
                {
                    text:"Log 2+2",
                    title: "Log in the Console 2+2",
                    action: ()=>{
                        console.log(2+2);
                    },
                },
            ]
        }));

        popupContainer.appendChild(popupContent);
        document.body.appendChild(popupContainer);

        popupContainer.querySelector("button").focus();
    };
    </script>
</body>
